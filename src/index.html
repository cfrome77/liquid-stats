<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Liquid Stats</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Liquid Stats - Track every pour you enjoy. View your beer history, checkins, and statistics."
    />
    <meta name="theme-color" content="#c2185b" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link
      rel="preload"
      as="image"
      href="/assets/images/LiquidStatsLogo.webp"
      imagesrcset="/assets/images/LiquidStatsLogo-400w.webp 400w, /assets/images/LiquidStatsLogo.webp 1280w"
      imagesizes="(max-width: 400px) 100vw, 420px"
      fetchpriority="high"
    />

    <link
      rel="preconnect"
      href="https://www.googletagmanager.com"
      crossorigin
    />
    <link
      rel="preconnect"
      href="https://www.google-analytics.com"
      crossorigin
    />
    <link rel="preconnect" href="https://assets.untappd.com" crossorigin />
    <link rel="preconnect" href="https://images.untp.beer" crossorigin />
  </head>
  <body class="mat-typography">
    <app-root></app-root>
  </body>
</html>
