<div class="main-content-container">
  <h1>Wishlist</h1>

  @if (wishlist.length > 0) {
    <div class="flex-column" style="align-items: stretch; gap: 10px">
      @for (item of paginatedWishlist; track item.title) {
        <app-card [cardData]="item"></app-card>
      }
    </div>

    @if (totalItems > itemsPerPage) {
      <app-pagination
        [totalItems]="totalItems"
        [itemsPerPage]="itemsPerPage"
        [currentPage]="currentPage"
        (pageChange)="goToPage($event)"
      >
      </app-pagination>
    }
  } @else {
    <app-empty-state
      icon="bookmark_border"
      message="Your wishlist is currently empty."
      buttonText="Explore Beers"
      (action)="navigateToCheckins()"
    ></app-empty-state>
  }
</div>
