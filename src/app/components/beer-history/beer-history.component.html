<div class="main-content-container">
  <h1>Beer History</h1>
  <div class="filter-card">
    <div class="filter-card-content">
      <div class="filter-buttons-container">
        <app-filter
          [filterFields]="filterFields"
          (filterChanged)="onFilterChange()"
        ></app-filter>
      </div>

      <div class="filter-row">
        <div class="form-field-wrapper">
          <mat-form-field class="search-field" appearance="outline">
            <input
              matInput
              type="text"
              placeholder="Search beers..."
              [(ngModel)]="searchTerm"
              (input)="onSearchChange()"
            />
          </mat-form-field>
        </div>

        <button mat-flat-button color="primary" (click)="resetFilters()">
          Reset Filters
        </button>
      </div>
    </div>
  </div>

  <div class="flex-column" style="align-items: stretch; gap: 10px">
    @for (beerCard of paginatedBeers; track beerCard.title) {
      <app-card [cardData]="beerCard"></app-card>
    } @empty {
      <app-empty-state
        icon="search_off"
        message="No beers match your search criteria."
        buttonText="Clear Filters"
        (action)="resetFilters()"
      ></app-empty-state>
    }
  </div>

  <div
    *ngIf="isLoadingAll"
    class="flex-row"
    style="justify-content: center; margin: 20px 0"
  >
    <span>Loading...</span>
  </div>

  <app-pagination
    [currentPage]="currentPage"
    [itemsPerPage]="itemsPerPage"
    [totalItems]="totalItems"
    (pageChange)="goToPage($event)"
    (itemsPerPageChange)="changeItemsPerPage($event)"
  >
  </app-pagination>
</div>
