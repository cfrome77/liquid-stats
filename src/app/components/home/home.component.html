<div class="home-container">

      <h1 class="main-title">Liquid Stats</h1>
      <p class="subtitle">Your Personal Untappd Dashboard</p>

      <div class="cta-container">
        <button
          mat-raised-button
          color="primary"
          class="main-cta"
          routerLink="/checkins"
        >
          <mat-icon>history</mat-icon>
          Latest Checkins
        </button>
      </div>

      <div class="quick-links">
        <button mat-flat-button class="quick-link-btn" routerLink="/stats">
          <mat-icon>bar_chart</mat-icon>
          Stats
        </button>
        <button mat-flat-button class="quick-link-btn" routerLink="/top-beers">
          <mat-icon>emoji_events</mat-icon>

        </button>
      </div>
    </div>
  </div>
</div>
