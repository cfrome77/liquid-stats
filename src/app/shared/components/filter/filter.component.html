<!-- Filter Buttons -->
<div class="filter-container-wrapper">
  @for (filter of filterFields; track filter.field) {
    <button
      type="button"
      class="stats-filter-button"
      [class.active-filter]="isFilterModified(filter)"
      (click)="openFilterModal(filter)"
      [attr.aria-label]="'Filter by ' + filter.label"
    >
      <mat-icon>{{ getFilterIcon(filter.field) }}</mat-icon>
      <span>{{ filter.label }}</span>
    </button>
  }
</div>

<!-- Modal -->
@if (activeFilter) {
  <div class="modal-overlay" (click)="closeModal()">
    <div class="modal-content" (click)="$event.stopPropagation()">
      <!-- Header -->
      <div class="modal-header">
        <button
          type="button"
          class="back-button"
          (click)="closeModal()"
          aria-label="Close modal"
        >
          <mat-icon>close</mat-icon>
        </button>
        <div class="modal-button-container">
          @if (activeFilter.type !== "date") {
            <button
              type="button"
              class="reset-button"
              (click)="toggleSelectDeselect()"
            >
              {{ allSelected ? "Deselect All" : "Select All" }}
            </button>
          }
          <button type="button" class="apply-button" (click)="applyFilter()">
            Apply
          </button>
        </div>
      </div>

      <!-- Body -->
      <div class="modal-body">
        @if (activeFilter.type === "date") {
          <div class="date-range-filter">
            <mat-form-field appearance="outline" class="date-picker-field">
              <mat-label>From</mat-label>
              <input
                matInput
                [matDatepicker]="pickerFrom"
                [min]="toDate(activeFilter.options[0])"
                [max]="toDate(activeFilter.options[1])"
                [value]="toDate(activeFilter.selected[0])"
                (dateChange)="onDateFromChange($event)"
                (click)="pickerFrom.open()"
                readonly
              />
              <mat-datepicker-toggle
                matSuffix
                [for]="pickerFrom"
              ></mat-datepicker-toggle>
              <mat-datepicker #pickerFrom></mat-datepicker>
            </mat-form-field>

            <mat-form-field appearance="outline" class="date-picker-field">
              <mat-label>To</mat-label>
              <input
                matInput
                [matDatepicker]="pickerTo"
                [min]="toDate(activeFilter.options[0])"
                [max]="toDate(activeFilter.options[1])"
                [value]="toDate(activeFilter.selected[1])"
                (dateChange)="onDateToChange($event)"
                (click)="pickerTo.open()"
                readonly
              />
              <mat-datepicker-toggle
                matSuffix
                [for]="pickerTo"
              ></mat-datepicker-toggle>
              <mat-datepicker #pickerTo></mat-datepicker>
            </mat-form-field>
          </div>
        }

        @if (activeFilter.type !== "date") {
          @for (option of activeFilter.options; track option) {
            @if (shouldShowOption(option)) {
              <label class="filter-option-label">
                <input
                  type="checkbox"
                  [checked]="activeFilter.selected.includes(option)"
                  (change)="onCheckboxChange(option, $event)"
                />
                <span class="option-label-text">
                  {{
                    activeFilter.field === "rating"
                      ? formatRating(option)
                      : option
                  }}
                </span>
                <span class="option-count">{{
                  activeFilter.countMap?.[option] ?? 0
                }}</span>
              </label>
            }
          }
        }
      </div>
    </div>
  </div>
}
